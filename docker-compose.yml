services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alletech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alletech}
      POSTGRES_DB: ${POSTGRES_DB:-alletech_dashboard}
    ports:
      - "5433:5432"
    volumes:
      - alletech_postgres_data:/var/lib/postgresql/data

volumes:
  alletech_postgres_data:
